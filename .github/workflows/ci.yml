name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - '3.11'
          - '3.12'
          - '3.13'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Ruff
        run: uv run ruff check src/ tests/

      - name: Mypy
        run: uv run mypy src/aiwf/

      - name: Contracts lint
        run: uv run aiwf contracts lint

      - name: Pytest
        run: uv run pytest tests/ -x -q

  workflow-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.11'

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Doctor JSON gate
        run: uv run aiwf doctor --json > doctor-report.json

      - name: Compile smoke
        shell: bash
        run: |
          set -euo pipefail
          tmpdir="$(mktemp -d)"
          uv run aiwf compile claude --ai-root .ai --output "$tmpdir/claude"
          uv run aiwf compile codex --ai-root .ai --output "$tmpdir/codex"
          uv run aiwf compile rp --ai-root .ai --output "$tmpdir/rp"

      - name: Upload doctor report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: doctor-report
          path: doctor-report.json
