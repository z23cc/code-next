name: Release Check

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  validate-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Python
        run: uv python install 3.11

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          uv run python -c "import os, tomllib; from pathlib import Path; data = tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8')); version = data['project']['version']; tag = os.environ['RELEASE_TAG']; expected = f'v{version}'; raise SystemExit(0 if tag == expected else f'Tag {tag} does not match package version {version}')"

      - name: Ruff
        run: uv run ruff check src/ tests/

      - name: Mypy
        run: uv run mypy src/aiwf/

      - name: Pytest
        run: uv run pytest tests/ -x -q

      - name: Build package artifacts
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aiwf-dist
          path: dist/*
