name: Release Check

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  validate-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Python
        run: uv python install 3.11

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Ruff
        run: uv run ruff check src/ tests/

      - name: Mypy
        run: uv run mypy src/aiwf/

      - name: Pytest
        run: uv run pytest tests/ -x -q

      - name: Build package artifacts
        run: uv build

      - name: Verify release metadata and built artifacts
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          args=(uv run python -m aiwf.release verify --dist dist --write-manifest dist/release-metadata.json)
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            args+=(--expect-tag "${RELEASE_TAG}")
          fi
          "${args[@]}"

      - name: Summarize release metadata
        run: |
          {
            echo "## Release Metadata"
            echo
            echo '```json'
            cat dist/release-metadata.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aiwf-release-bundle
          path: dist/*
