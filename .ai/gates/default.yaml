name: default
description: Default validation gates for aiwf.
gates:
  - name: lint
    command: "uv run ruff check src/ tests/"
    timeout_seconds: 120
  - name: typecheck
    command: "uv run mypy src/aiwf/"
    timeout_seconds: 120
  - name: test
    command: "uv run pytest tests/ -x -q"
    timeout_seconds: 120
